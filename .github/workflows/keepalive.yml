name: Keep Backend Alive

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          set -e
          curl --retry 3 --retry-delay 5 --max-time 25 --fail --silent --show-error \
            https://dbms-mini-project-1.onrender.com/health
